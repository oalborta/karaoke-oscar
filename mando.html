<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mando Karaoke</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            padding: 0; 
            margin: 0; 
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container { 
            width: 100%; 
            max-width: 420px; 
            padding: 30px 20px; 
            background: rgba(20, 20, 20, 0.8); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
            overflow-y: auto; 
        }

        h2 { 
            margin: 0 0 25px 0; 
            font-size: 20px; 
            font-weight: 300; 
            color: #ffffff; 
            letter-spacing: 1px;
            text-align: center;
        }

        input { 
            width: 100%; 
            padding: 14px 15px; 
            font-size: 15px; 
            border-radius: 10px; 
            border: 1px solid #333333; 
            background: rgba(255, 255, 255, 0.05); 
            color: #ffffff; 
            margin-bottom: 12px; 
            box-sizing: border-box; 
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #ff0050; } 
        input::placeholder { color: #666666; }

        .btn { 
            width: 100%; 
            padding: 15px; 
            font-size: 15px; 
            color: #ffffff; 
            border: none; 
            border-radius: 10px; 
            font-weight: 600; 
            cursor: pointer; 
            letter-spacing: 0.5px;
            transition: transform 0.1s, box-shadow 0.3s;
            box-sizing: border-box; /* Esto mantiene el ancho perfecto */
        }
        .btn:active { transform: scale(0.98); }

        .btn-add { 
            background: linear-gradient(135deg, #ff0050 0%, #cc0040 100%);
            box-shadow: 0 4px 15px rgba(255, 0, 80, 0.2);
        }

        .btn-skip { 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid #444;
            margin-top: 15px; 
        }

        .btn-share { 
            background: transparent; 
            border: 1px solid #555;
            color: #888;
            margin-top: 10px; 
            font-size: 13px;
            padding: 12px;
        }

        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222; 
            padding-bottom: 8px;
            margin-top: 25px;
        }
        .queue-header h3 { 
            font-size: 12px; 
            color: #666; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin: 0;
        }
        
        .clear-btn {
            background: none;
            border: none;
            color: #444;
            font-size: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 2px 5px;
        }
        .clear-btn:active { 
            color: #ff0050; 
        }

        .song { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 10px 12px; 
            margin-bottom: 6px; 
            border-radius: 8px; 
            font-size: 13px; 
            color: #cccccc; 
            border-left: 3px solid #ff0050;
            display: flex;
            justify-content: space-between;
        }
        .more-songs { 
            color: #555; 
            font-size: 12px; 
            text-align: center; 
            margin-top: 10px; 
            font-style: italic; 
        }
        
        #qr-section { 
            margin-top: 20px; 
            text-align: center;
            padding: 15px;
            background: #111;
            border-radius: 12px;
            border: 1px solid #222;
            display: none; 
        }
        #qr-section img { border-radius: 8px; }
        #qr-section p { color: #555; font-size: 11px; margin: 8px 0 0 0; text-transform: uppercase; letter-spacing: 1px;}
        
        .brand { 
            margin-top: 40px; 
            font-size: 10px; 
            color: #333333; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>CONTROL DE PEDIDOS</h2>
        
        <input type="text" id="name-input" placeholder="TU NOMBRE (Para mostrar en TV)">
        <input type="text" id="url-input" placeholder="PEGA AQUÍ EL LINK QUE COPIASTE">
        
        <button class="btn btn-add" onclick="addToQueue()">ENVIAR A COLA</button>
        
        <!-- El botón de YouTube arreglado -->
        <a href="https://www.youtube.com/results?search_query=karaoke+" target="_blank" style="display:block; width:100%; text-align:center; color:#888; font-size:14px; font-weight:bold; text-decoration:none; padding:12px; border:1px solid #ff0050; border-radius:8px; box-sizing: border-box; margin-top: 8px;">BUSCAR CANCIÓN EN YouTube <span style="color:#ff0050;">▶</span></a>
        <small style="display:block; text-align:center; color:#999; font-size:11px; margin-top:5px;">Copia el link y cierra la pestaña</small>

        <button class="btn btn-skip" onclick="skipSong()">SALTAR CANCIÓN</button>
        <button class="btn btn-share" onclick="toggleQR()">COMPARTIR MANDO</button>

        <div id="current-queue">
            <div class="queue-header">
                <h3>En espera</h3>
                <button class="clear-btn" onclick="clearQueue()">Limpiar todo</button>
            </div>
            <p style="color:#444; font-size:13px; margin-top:10px;">Vacía</p>
        </div>

        <div id="qr-section">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=" id="qr-img" alt="QR">
            <p>Escanear para unirse</p>
        </div>

        <div class="brand">Karaoke de Oscar Alborta</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        document.getElementById("qr-img").src = "https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=" + window.location.href;

        const firebaseConfig = {
           apiKey: "AIzaSyCvRlHlmkCsK1PMTgKda-IW_ZpFCs4OMfc",
  	   authDomain: "karaoke-oa01.firebaseapp.com",
  	   databaseURL: "https://karaoke-oa01-default-rtdb.firebaseio.com",
  	   projectId: "karaoke-oa01",
  	   storageBucket: "karaoke-oa01.firebasestorage.app",
 	   messagingSenderId: "494779868067",
 	   appId: "1:494779868067:web:10768f9f3d88e7e8c6f016",
 	   measurementId: "G-HV4BKVH5FY"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const queueRef = db.ref('queue');

        function toggleQR() {
            const qr = document.getElementById('qr-section');
            if (qr.style.display === 'none' || qr.style.display === '') {
                qr.style.display = 'block';
            } else {
                qr.style.display = 'none';
            }
        }

        function extractVideoId(url) {
            var regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            var match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }

        function addToQueue() {
            const input = document.getElementById('url-input');
            const nameInput = document.getElementById('name-input');
            const videoId = extractVideoId(input.value);
            if (videoId) {
                queueRef.push({ videoId: videoId, name: nameInput.value || "Anónimo" });
                input.value = '';
                nameInput.value = '';
                input.style.borderColor = "#00ff00";
                setTimeout(() => input.style.borderColor = "#333333", 1000);
            } else {
                input.style.borderColor = "#ff0000";
                setTimeout(() => input.style.borderColor = "#333333", 1000);
            }
        }

        function skipSong() {
            queueRef.orderByKey().limitToFirst(1).once('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const firstKey = Object.keys(data)[0];
                    queueRef.child(firstKey).remove();
                }
            });
        }

        function clearQueue() {
            if (confirm("¿Seguro que quieres borrar toda la lista de espera?")) {
                queueRef.remove();
            }
        }

        queueRef.on('value', (snapshot) => {
            const data = snapshot.val();
            const div = document.getElementById('current-queue');
            
            let htmlCode = `
                <div class="queue-header">
                    <h3>En espera</h3>
                    <button class="clear-btn" onclick="clearQueue()">Limpiar todo</button>
                </div>
            `;

            if(data) {
                const keys = Object.keys(data);
                const playingNow = data[keys[0]];
                
                htmlCode += `<div class="song" style="border-left: 3px solid #00ff00; background: rgba(0, 255, 0, 0.1);"><span>${playingNow.name} (Sonando)</span></div>`;
                
                const waitingList = keys.slice(1);
                const limit = 5;
                const toShow = waitingList.slice(0, limit);
                
                toShow.forEach(key => {
                    htmlCode += `<div class="song"><span>${data[key].name}</span><span style="color:#555; font-size:10px;">Listo</span></div>`;
                });

                if (waitingList.length > limit) {
                    const remaining = waitingList.length - limit;
                    htmlCode += `<div class="more-songs">...y ${remaining} cancion(es) mas en espera</div>`;
                }

            } else {
                htmlCode += `<p style="color:#444; font-size:13px; margin-top:10px;">Vacía</p>`;
            }
            
            div.innerHTML = htmlCode; 
        });
    </script>
</body>
</html>
