<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>Mando Karaoke</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{
            font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
            background:#000;color:#fff;height:100vh;display:flex;justify-content:center;
            background-image:radial-gradient(ellipse at 30% 0%,rgba(255,0,80,.02) 0%,transparent 50%);
        }
        .container{
            width:100%;max-width:420px;padding:20px 16px;
            background:rgba(255,255,255,.015);
            backdrop-filter:blur(50px) saturate(130%);-webkit-backdrop-filter:blur(50px) saturate(130%);
            border-top:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.04);
            overflow-y:auto;-webkit-overflow-scrolling:touch;
        }

        .rc{text-align:center;margin-bottom:14px}
        .rb{display:inline-block;padding:4px 12px;border-radius:14px;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
        .rb.dj{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);color:rgba(255,215,0,.8)}
        .rb.guest{background:rgba(255,0,80,.08);border:1px solid rgba(255,0,80,.2);color:rgba(255,0,80,.8)}
        .ri{text-align:center;font-size:8px;color:rgba(255,255,255,.1);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;font-weight:500}
        .ri strong{color:rgba(255,255,255,.2)}

        h2{margin:0 0 18px;font-size:16px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.5px;text-align:center}

        input{
            width:100%;padding:12px 14px;font-size:13px;border-radius:12px;
            border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.025);color:#fff;
            margin-bottom:8px;outline:none;transition:border-color .3s,box-shadow .3s;font-weight:500;
        }
        input:focus{border-color:rgba(255,0,80,.3);box-shadow:0 0 0 3px rgba(255,0,80,.06)}
        input::placeholder{color:rgba(255,255,255,.15);font-weight:400}

        .btn{width:100%;padding:13px;font-size:13px;color:#fff;border:none;border-radius:12px;font-weight:600;cursor:pointer;letter-spacing:.3px;transition:transform .12s}
        .btn:active{transform:scale(.97)}
        .btn-add{background:linear-gradient(135deg,#ff0050,#d6004a);box-shadow:0 4px 16px rgba(255,0,80,.12)}
        .btn-skip{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);margin-top:8px;color:rgba(255,255,255,.5)}
        .btn-skip:active{border-color:rgba(255,0,80,.3);color:#ff0050}
        .btn-share{background:transparent;border:1px solid rgba(255,255,255,.05);color:rgba(255,255,255,.2);margin-top:6px;font-size:11px;padding:10px}
        .btn-clear{background:transparent;border:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.15);margin-top:4px;font-size:10px;padding:8px}
        .btn-clear:active{color:#ff0050;border-color:rgba(255,0,80,.3)}

        .yt-link{
            display:block;width:100%;text-align:center;color:rgba(255,255,255,.3);font-size:12px;font-weight:600;
            text-decoration:none;padding:10px;border:1px solid rgba(255,0,80,.2);border-radius:10px;margin-top:6px;
            transition:all .2s;
        }
        .yt-link:active{background:rgba(255,0,80,.06)}
        .yt-link span{color:#ff0050}
        .yt-hint{display:block;text-align:center;color:rgba(255,255,255,.08);font-size:9px;margin-top:3px;margin-bottom:2px}

        .qh{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.03);padding-bottom:5px;margin-top:18px}
        .qh h3{font-size:8px;color:rgba(255,255,255,.15);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin:0}
        .cl-btn{background:none;border:none;color:rgba(255,255,255,.1);font-size:8px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;padding:2px 4px;font-weight:600}
        .cl-btn:active{color:#ff0050}

        .sg{background:rgba(255,255,255,.015);padding:8px 10px;margin-bottom:3px;border-radius:8px;font-size:11px;border-left:3px solid rgba(255,0,80,.4);display:flex;justify-content:space-between;align-items:center;color:rgba(255,100,128,.7);transition:all .15s}
        .sg.cur{border-left-color:rgba(0,255,0,.5);background:rgba(0,255,0,.02);color:rgba(0,255,0,.8)}
        .sg-l{font-size:7px;text-transform:uppercase;letter-spacing:1px;font-weight:700;flex-shrink:0}
        .sg-l.cur{color:rgba(0,255,0,.6)}.sg-l.w{color:rgba(255,255,255,.1)}
        .ms{color:rgba(255,255,255,.1);font-size:10px;text-align:center;margin-top:6px;font-style:normal;font-weight:400}

        .rx-t{font-size:8px;color:rgba(255,255,255,.08);text-transform:uppercase;letter-spacing:2px;text-align:center;margin-top:18px;font-weight:600}
        .rx-bar{display:flex;gap:8px;margin-top:8px}
        .rx-b{flex:1;padding:16px 6px;border-radius:14px;font-size:28px;text-align:center;cursor:pointer;border:none;transition:transform .1s,background .12s;-webkit-tap-highlight-color:transparent}
        .rx-b:active{transform:scale(.88)}
        .rx-b .rx-l{display:block;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:3px;opacity:.7}
        .rx-s{background:rgba(255,215,0,.06);color:#FFD700;border:1px solid rgba(255,215,0,.15)}
        .rx-s:active{background:rgba(255,215,0,.15)}
        .rx-tom{background:rgba(255,0,80,.06);color:#ff0050;border:1px solid rgba(255,0,80,.15)}
        .rx-tom:active{background:rgba(255,0,80,.15)}

        #qr-s{margin-top:14px;text-align:center;padding:12px;background:rgba(255,255,255,.01);border-radius:12px;border:1px solid rgba(255,255,255,.03);display:none}
        #qr-s img{border-radius:8px}
        #qr-s p{color:rgba(255,255,255,.1);font-size:9px;margin:5px 0 0;text-transform:uppercase;letter-spacing:1px}

        .wm{margin-top:28px;font-size:7px;color:rgba(255,255,255,.03);letter-spacing:2px;text-transform:uppercase;text-align:center;font-weight:600}

        .err-s{text-align:center;padding:50px 20px}
        .err-s .ei{font-size:40px;margin-bottom:12px;opacity:.6}
        .err-s h2{color:#ff0050;margin-bottom:4px;font-size:16px}
        .err-s p{color:rgba(255,255,255,.2);font-size:11px;line-height:1.6}

        #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(70px);padding:9px 18px;border-radius:12px;font-size:11px;font-weight:600;z-index:999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;background:rgba(20,20,20,.9);border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:#fff}
        #toast.show{transform:translateX(-50%) translateY(0)}
        #toast.ok{border-color:rgba(0,255,0,.3);color:rgba(0,255,0,.8)}
        #toast.err{border-color:rgba(255,0,80,.3);color:rgba(255,0,80,.8)}
    </style>
</head>
<body>
<div class="container" id="app"></div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
var firebaseConfig={apiKey:"AIzaSyCvRlHlmkCsK1PMTgKda-IW_ZpFCs4OMfc",authDomain:"karaoke-oa01.firebaseapp.com",databaseURL:"https://karaoke-oa01-default-rtdb.firebaseio.com",projectId:"karaoke-oa01",storageBucket:"karaoke-oa01.firebasestorage.app",messagingSenderId:"494779868067",appId:"1:494779868067:web:10768f9f3d88e7e8c6f016",measurementId:"G-HV4BKVH5FY"};
firebase.initializeApp(firebaseConfig);var db=firebase.database();

var roomCode='',role='',queueRef=null,stateRef=null,reactionsRef=null;

function extractVideoId(u){var r=/^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;var m=u.match(r);return(m&&m[7].length==11)?m[7]:false}
function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}

var toastT=null;
function showToast(m,t){var e=document.getElementById('toast');e.textContent=m;e.className='';if(t==='ok')e.className='ok';else if(t==='err')e.className='err';void e.offsetWidth;e.classList.add('show');if(toastT)clearTimeout(toastT);toastT=setTimeout(function(){e.classList.remove('show')},2000)}

function addToQueue(){
    var u=document.getElementById('url-input'),n=document.getElementById('name-input'),v=extractVideoId(u.value);
    if(v){queueRef.push({videoId:v,name:n.value||'Anónimo'});u.value='';n.value='';u.style.borderColor='rgba(0,255,0,.4)';setTimeout(function(){u.style.borderColor='rgba(255,255,255,.06)'},1000);showToast('Enviado a la cola','ok')}
    else{u.style.borderColor='rgba(255,68,85,.5)';setTimeout(function(){u.style.borderColor='rgba(255,255,255,.06)'},1000);showToast('Link no válido','err')}
}

function skipSong(){
    stateRef.once('value',function(s){var st=s.val();
        if(st==='countdown'){reactionsRef.remove();db.ref('rooms/'+roomCode+'/countdownEnd').remove();stateRef.set('playing');showToast('Countdown saltado','ok')}
        else if(st==='playing'){queueRef.orderByKey().limitToFirst(1).once('value',function(s){var d=s.val();if(d){queueRef.child(Object.keys(d)[0]).remove();showToast('Canción saltada','ok')}else showToast('No hay canciones','err')})}
        else showToast('No hay canción activa','err')
    });
}

function clearQueue(){if(confirm('¿Borrar toda la lista?')){queueRef.remove();stateRef.set('idle');reactionsRef.remove();showToast('Cola borrada','ok')}}
function sendStar(){reactionsRef.push({type:'star'})}
function sendTomato(){reactionsRef.push({type:'tomato'})}
function toggleQR(){var q=document.getElementById('qr-s');q.style.display=(q.style.display==='none'||q.style.display==='')?'block':'none'}

function renderQueue(snap){
    var data=snap.val(),div=document.getElementById('qd');if(!div)return;
    var h='<div class="qh"><h3>En espera</h3>';if(role==='dj')h+='<button class="cl-btn" onclick="clearQueue()">Limpiar</button>';h+='</div>';
    if(data){var k=Object.keys(data),p=data[k[0]],w=k.slice(1);
        h+='<div class="sg cur"><span>'+esc(p.name)+'</span><span class="sg-l cur">Sonando</span></div>';
        var sh=w.slice(0,5);for(var i=0;i<sh.length;i++)h+='<div class="sg"><span>'+esc(data[sh[i]].name)+'</span><span class="sg-l w">Listo</span></div>';
        if(w.length>5)h+='<div class="ms">...y '+(w.length-5)+' más</div>';
    }else h+='<p style="color:rgba(255,255,255,.06);font-size:10px;margin-top:8px;text-align:center">Vacía</p>';
    div.innerHTML=h;
}

function showError(m){document.getElementById('app').innerHTML='<div class="err-s"><div class="ei">&#9888;&#65039;</div><h2>Error</h2><p>'+m+'</p></div>'}

function buildUI(){
    var isDj=role==='dj',h='';
    h+='<div class="rc"><span class="rb '+(isDj?'dj':'guest')+'">'+(isDj?'Control DJ':'Pedir canción')+'</span></div>';
    h+='<div class="ri">Sala: <strong>'+esc(roomCode)+'</strong></div>';
    h+='<h2>Control de pedidos</h2>';
    h+='<input type="text" id="name-input" placeholder="Tu nombre (para mostrar en TV)">';
    h+='<input type="text" id="url-input" placeholder="Pega aquí el link que copiste">';
    h+='<button class="btn btn-add" onclick="addToQueue()">ENVIAR A COLA</button>';
    h+='<a href="https://www.youtube.com/results?search_query=karaoke+-vevo+-official+" target="_blank" class="yt-link">BUSCAR CANCIÓN EN YOUTUBE <span>&#9654;</span></a>';
    h+='<small class="yt-hint">Copia el link y cierra la pestaña</small>';
    if(isDj)h+='<button class="btn btn-skip" onclick="skipSong()">SALTAR CANCIÓN</button>';
    h+='<button class="btn btn-share" onclick="toggleQR()">COMPARTIR MANDO</button>';
    h+='<div id="qd"><p style="color:rgba(255,255,255,.06);font-size:10px;margin-top:18px;text-align:center">Cargando...</p></div>';
    h+='<div class="rx-t">Reacciones en vivo</div>';
    h+='<div class="rx-bar"><button class="rx-b rx-s" onclick="sendStar()">&#11088;<span class="rx-l">Estrella</span></button><button class="rx-b rx-tom" onclick="sendTomato()">&#127813;<span class="rx-l">Tomate</span></button></div>';
    h+='<div id="qr-s"><img src="https://api.qrserver.com/v1/create-qr-code/?size=110x110&data='+encodeURIComponent(window.location.href)+'" alt="QR"><p>Escanear para unirse</p></div>';
    h+='<div class="wm">Karaoke de Oscar Alborta</div>';
    document.getElementById('app').innerHTML=h;
    document.getElementById('url-input').addEventListener('keydown',function(e){if(e.key==='Enter')addToQueue()});
    document.getElementById('name-input').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('url-input').focus()});
}

function init(){
    var p=new URLSearchParams(window.location.search);
    roomCode=(p.get('room')||'').trim().toUpperCase();role=(p.get('role')||'').trim().toLowerCase();
    if(roomCode.length<3){showError('Código no válido. Abre este mando desde la pantalla principal.');return}
    if(role!=='dj'&&role!=='guest'){showError('Rol no reconocido.');return}
    buildUI();var base=db.ref('rooms/'+roomCode);queueRef=base.child('queue');stateRef=base.child('state');reactionsRef=base.child('reactions');
    queueRef.on('value',renderQueue);
}
init();
</script>
</body>
</html>
