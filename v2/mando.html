<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mando Karaoke</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 30px 20px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
            overflow-y: auto;
        }

        /* Role badge */
        .role-badge {
            text-align: center;
            margin-bottom: 20px;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: inline-block;
        }
        .role-badge.dj {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #FFD700;
        }
        .role-badge.guest {
            background: rgba(255, 0, 80, 0.1);
            border: 1px solid rgba(255, 0, 80, 0.3);
            color: #ff0050;
        }
        .role-center { text-align: center; }

        /* Room info */
        .room-info {
            text-align: center;
            font-size: 10px;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .room-info strong { color: #666; }

        h2 {
            margin: 0 0 25px 0;
            font-size: 20px;
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 1px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 14px 15px;
            font-size: 15px;
            border-radius: 10px;
            border: 1px solid #333333;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            margin-bottom: 12px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #ff0050; }
        input::placeholder { color: #666666; }

        .btn {
            width: 100%;
            padding: 15px;
            font-size: 15px;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: transform 0.1s, box-shadow 0.3s;
            box-sizing: border-box;
        }
        .btn:active { transform: scale(0.98); }

        .btn-add {
            background: linear-gradient(135deg, #ff0050 0%, #cc0040 100%);
            box-shadow: 0 4px 15px rgba(255, 0, 80, 0.2);
        }
        .btn-skip {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
            margin-top: 12px;
        }
        .btn-clear {
            background: transparent;
            border: 1px solid #333;
            color: #555;
            margin-top: 8px;
            font-size: 12px;
            padding: 10px;
        }
        .btn-clear:active { color: #ff0050; border-color: #ff0050; }
        .btn-share {
            background: transparent;
            border: 1px solid #555;
            color: #888;
            margin-top: 10px;
            font-size: 13px;
            padding: 12px;
        }

        .yt-link {
            display: block;
            width: 100%;
            text-align: center;
            color: #888;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            padding: 12px;
            border: 1px solid #ff0050;
            border-radius: 8px;
            box-sizing: border-box;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .yt-link:hover { background: rgba(255,0,80,0.05); }
        .yt-link span { color: #ff0050; }
        .yt-hint {
            display: block;
            text-align: center;
            color: #999;
            font-size: 11px;
            margin-top: 5px;
            margin-bottom: 4px;
        }

        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
            margin-top: 25px;
        }
        .queue-header h3 {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }
        .clear-btn {
            background: none;
            border: none;
            color: #444;
            font-size: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 2px 5px;
        }
        .clear-btn:active { color: #ff0050; }

        .song {
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 8px;
            font-size: 13px;
            color: #cccccc;
            border-left: 3px solid #ff0050;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .song.playing {
            border-left-color: #00ff00;
            background: rgba(0, 255, 0, 0.08);
        }
        .song-playing-label {
            font-size: 9px;
            color: #00ff00;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .more-songs {
            color: #555;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            font-style: italic;
        }

        #qr-section {
            margin-top: 20px;
            text-align: center;
            padding: 15px;
            background: #111;
            border-radius: 12px;
            border: 1px solid #222;
            display: none;
        }
        #qr-section img { border-radius: 8px; }
        #qr-section p {
            color: #555;
            font-size: 11px;
            margin: 8px 0 0 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .brand {
            margin-top: 40px;
            font-size: 10px;
            color: #333333;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            font-weight: bold;
        }

        /* Error */
        .error-screen {
            text-align: center;
            padding: 60px 20px;
        }
        .error-screen .icon { font-size: 48px; margin-bottom: 16px; }
        .error-screen h2 { color: #ff0050; margin-bottom: 8px; }
        .error-screen p { color: #666; font-size: 13px; line-height: 1.6; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            z-index: 999;
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
            pointer-events: none;
            white-space: nowrap;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.ok { border-color: #00ff00; color: #00ff00; }
        #toast.err { border-color: #ff0050; color: #ff0050; }
    </style>
</head>
<body>

    <div class="container" id="app">
        <!-- Se renderiza con JS -->
    </div>

    <div id="toast"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        /* =============================================
           FIREBASE
           ============================================= */
        var firebaseConfig = {
            apiKey: "AIzaSyCvRlHlmkCsK1PMTgKda-IW_ZpFCs4OMfc",
            authDomain: "karaoke-oa01.firebaseapp.com",
            databaseURL: "https://karaoke-oa01-default-rtdb.firebaseio.com",
            projectId: "karaoke-oa01",
            storageBucket: "karaoke-oa01.firebasestorage.app",
            messagingSenderId: "494779868067",
            appId: "1:494779868067:web:10768f9f3d88e7e8c6f016",
            measurementId: "G-HV4BKVH5FY"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        /* =============================================
           ESTADO
           ============================================= */
        var roomCode = '';
        var role = '';
        var queueRef = null;

        /* =============================================
           UTILIDADES
           ============================================= */
        function extractVideoId(url) {
            var regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            var match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /* =============================================
           TOAST
           ============================================= */
        var toastTimer = null;
        function showToast(msg, type) {
            var el = document.getElementById('toast');
            el.textContent = msg;
            el.className = '';
            if (type === 'ok') el.className = 'ok';
            else if (type === 'err') el.className = 'err';
            void el.offsetWidth;
            el.classList.add('show');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2000);
        }

        /* =============================================
           ACCIONES
           ============================================= */
        function addToQueue() {
            var urlInput = document.getElementById('url-input');
            var nameInput = document.getElementById('name-input');
            var videoId = extractVideoId(urlInput.value);

            if (videoId) {
                queueRef.push({
                    videoId: videoId,
                    name: nameInput.value || 'Anónimo'
                });
                urlInput.value = '';
                nameInput.value = '';
                urlInput.style.borderColor = '#00ff00';
                setTimeout(function() { urlInput.style.borderColor = '#333333'; }, 1000);
                showToast('Enviado a la cola', 'ok');
            } else {
                urlInput.style.borderColor = '#ff0000';
                setTimeout(function() { urlInput.style.borderColor = '#333333'; }, 1000);
                showToast('Link no válido', 'err');
            }
        }

        function skipSong() {
            queueRef.orderByKey().limitToFirst(1).once('value', function(snapshot) {
                var data = snapshot.val();
                if (data) {
                    var firstKey = Object.keys(data)[0];
                    queueRef.child(firstKey).remove();
                    showToast('Canción saltada', 'ok');
                } else {
                    showToast('No hay canciones', 'err');
                }
            });
        }

        function clearQueue() {
            if (confirm('¿Seguro que quieres borrar toda la lista de espera?')) {
                queueRef.remove();
                showToast('Cola borrada', 'ok');
            }
        }

        function toggleQR() {
            var qr = document.getElementById('qr-section');
            if (qr.style.display === 'none' || qr.style.display === '') {
                qr.style.display = 'block';
            } else {
                qr.style.display = 'none';
            }
        }

        /* =============================================
           RENDERIZAR COLA
           ============================================= */
        function renderQueue(snapshot) {
            var data = snapshot.val();
            var div = document.getElementById('queue-display');
            if (!div) return;

            var html = '<div class="queue-header"><h3>En espera</h3>';

            // Botón "Limpiar todo" solo para DJ
            if (role === 'dj') {
                html += '<button class="clear-btn" onclick="clearQueue()">Limpiar todo</button>';
            }
            html += '</div>';

            if (data) {
                var keys = Object.keys(data);
                var playing = data[keys[0]];
                var waiting = keys.slice(1);

                // Canción sonando
                html += '<div class="song playing"><span>' + escapeHtml(playing.name) + '</span><span class="song-playing-label">Sonando</span></div>';

                // Canciones en espera
                var limit = 5;
                var toShow = waiting.slice(0, limit);
                for (var i = 0; i < toShow.length; i++) {
                    html += '<div class="song"><span>' + escapeHtml(data[toShow[i]].name) + '</span><span style="color:#555;font-size:10px;">Listo</span></div>';
                }

                if (waiting.length > limit) {
                    html += '<div class="more-songs">...y ' + (waiting.length - limit) + ' canción(es) más en espera</div>';
                }
            } else {
                html += '<p style="color:#444;font-size:13px;margin-top:10px;">Vacía</p>';
            }

            div.innerHTML = html;
        }

        /* =============================================
           PANTALLA DE ERROR
           ============================================= */
        function showError(msg) {
            document.getElementById('app').innerHTML =
                '<div class="error-screen">' +
                '<div class="icon">&#9888;&#65039;</div>' +
                '<h2>Error</h2>' +
                '<p>' + msg + '</p>' +
                '</div>';
        }

        /* =============================================
           CONSTRUIR INTERFAZ
           ============================================= */
        function buildUI() {
            var isDj = (role === 'dj');
            var roleLabel = isDj ? 'CONTROL DJ' : 'PEDIR CANCIÓN';
            var roleClass = isDj ? 'dj' : 'guest';

            var html = '';

            // Role badge
            html += '<div class="role-center"><span class="role-badge ' + roleClass + '">' + roleLabel + '</span></div>';

            // Room info
            html += '<div class="room-info">Sala: <strong>' + escapeHtml(roomCode) + '</strong></div>';

            // Título
            html += '<h2>CONTROL DE PEDIDOS</h2>';

            // Inputs
            html += '<input type="text" id="name-input" placeholder="TU NOMBRE (Para mostrar en TV)">';
            html += '<input type="text" id="url-input" placeholder="PEGA AQUÍ EL LINK QUE COPIASTE">';

            // Botón enviar
            html += '<button class="btn btn-add" onclick="addToQueue()">ENVIAR A COLA</button>';

            // Link YouTube
            html += '<a href="https://www.youtube.com/results?search_query=karaoke+-vevo+-official+" target="_blank" class="yt-link">BUSCAR CANCIÓN EN YouTube <span>&#9654;</span></a>';
            html += '<small class="yt-hint">Copia el link y cierra la pestaña</small>';

            // Botones DJ (solo visible si rol = dj)
            if (isDj) {
                html += '<button class="btn btn-skip" onclick="skipSong()">SALTAR CANCIÓN</button>';
            }

            // Compartir QR
            html += '<button class="btn btn-share" onclick="toggleQR()">COMPARTIR MANDO</button>';

            // Cola
            html += '<div id="queue-display">';
            html += '<div class="queue-header"><h3>En espera</h3>';
            if (isDj) {
                html += '<button class="clear-btn" onclick="clearQueue()">Limpiar todo</button>';
            }
            html += '</div>';
            html += '<p style="color:#444;font-size:13px;margin-top:10px;">Cargando...</p>';
            html += '</div>';

            // QR section
            html += '<div id="qr-section">';
            html += '<img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=' + encodeURIComponent(window.location.href) + '" alt="QR">';
            html += '<p>Escanear para unirse</p>';
            html += '</div>';

            // Brand
            html += '<div class="brand">Karaoke de Oscar Alborta</div>';

            document.getElementById('app').innerHTML = html;

            // Enter en el input de URL
            document.getElementById('url-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') addToQueue();
            });
            document.getElementById('name-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') document.getElementById('url-input').focus();
            });
        }

        /* =============================================
           INICIO
           ============================================= */
        function init() {
            // Leer parámetros URL
            var params = new URLSearchParams(window.location.search);
            roomCode = (params.get('room') || '').trim().toUpperCase();
            role = (params.get('role') || '').trim().toLowerCase();

            // Validar
            if (roomCode.length < 3) {
                showError('Código de sala no válido. Abre este mando desde la pantalla principal escaneando el QR.');
                return;
            }
            if (role !== 'dj' && role !== 'guest') {
                showError('Rol no reconocido. Usa "dj" o "guest".');
                return;
            }

            // Construir interfaz
            buildUI();

            // Conectar a Firebase
            queueRef = db.ref('rooms/' + roomCode + '/queue');
            queueRef.on('value', renderQueue);
        }

        init();
    </script>
</body>
</html>
