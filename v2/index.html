<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TV Karaoke V2</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: radial-gradient(circle at top, #111 0%, #000 100%); }
        #setup-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999999; }
        #setup-screen h1 { margin: 0 0 10px 0; font-weight: 300; font-size: 28px; letter-spacing: 6px; text-transform: uppercase; color: #888;}
        #setup-screen p { color: #555; font-size: 13px; letter-spacing: 1px; margin-bottom: 30px; text-transform: uppercase;}
        #setup-screen input { padding: 18px 24px; font-size: 28px; text-align: center; border-radius: 16px; border: none; background: rgba(255,255,255,0.05); color: white; text-transform: uppercase; letter-spacing: 8px; outline: none; box-shadow: inset 0 2px 6px rgba(0,0,0,0.5); width: 320px; }
        #setup-screen button { margin-top: 20px; padding: 16px 40px; font-size: 16px; background: linear-gradient(135deg, #ff0050 0%, #cc0040 100%); color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 700; letter-spacing: 2px; box-shadow: 0 8px 25px rgba(255, 0, 80, 0.3);}
        .qr-container { display: none; margin-top: 50px; gap: 40px; }
        .qr-box { text-align: center; background: rgba(20,20,20,0.6); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .qr-box h3 { font-size: 11px; color: #555; margin: 15px 0 5px 0; text-transform: uppercase; letter-spacing: 3px; font-weight: 600;}
        .qr-box.dj h3 { color: #ff4477; }
        .qr-box img { border-radius: 10px; border: 2px solid rgba(255,255,255,0.05); }
        #player { width: 100vw; height: 100vh; }
        .hud-box { position: fixed; z-index: 9999; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); color: #666; font-size: 13px; font-weight: 500; letter-spacing: 1px;}
        #room-code-display { top: 20px; left: 20px; padding: 8px 16px; color: #777;}
        #status { top: 20px; right: 20px; padding: 8px 16px; }
        #singer-label { position: fixed; bottom: 30px; left: 30px; color: #ddd; font-size: 18px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); padding: 10px 24px; border-radius: 30px; z-index: 9999; border: 1px solid rgba(255,255,255,0.05); display: none; font-weight: 500;}
        #vote-display { position: fixed; bottom: 30px; right: 30px; display: none; flex-direction: column; align-items: flex-end; z-index: 9999; gap: 8px; }
        .vote-box { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 8px 16px; border-radius: 30px; font-size: 22px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.05);}
        #star-count { color: #ffdd00; font-weight: bold; }
        #tomato-count { color: #ff4444; font-weight: bold; }
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.95); z-index: 999999; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        #countdown-overlay .next-text { font-size: 14px; color: #555; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 5px; font-weight: 600;}
        #countdown-overlay .next-name { font-size: 48px; font-weight: 300; margin-bottom: 10px; color: #eee; letter-spacing: 2px;}
        #countdown-overlay .result { font-size: 20px; color: #888; margin-bottom: 20px; font-weight: 500;}
        #countdown-overlay .timer { font-size: 80px; color: #ff0050; font-weight: 200; letter-spacing: -5px; }
        #blocked-overlay .blocked-icon { font-size: 60px; margin-bottom: 25px; color: #ff0050; opacity: 0.8; }
        #blocked-overlay .blocked-text { font-size: 24px; font-weight: 600; color: #ff4477; margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase; }
        #blocked-overlay .blocked-sub { font-size: 16px; color: #555; line-height: 1.5; }
    </style>
</head>
<body>
    <div id="setup-screen">
        <h1>Karaoke</h1>
        <p>Configurar fiesta</p>
        <input type="text" id="room-input" placeholder="CÓDIGO" maxlength="6">
        <button onclick="startParty()">INICIAR</button>
        <div class="qr-container" id="qr-container">
            <div class="qr-box dj"><h3>Ctrl DJ</h3><img src="" id="qr-dj" width="150" height="150"></div>
            <div class="qr-box"><h3>Invitados</h3><img src="" id="qr-guest" width="150" height="150"></div>
        </div>
    </div>
    <div id="main-ui" style="display:none;">
        <div id="room-code-display" class="hud-box">SALA <span id="code-text">----</span></div>
        <div id="status" class="hud-box">COLA: <span id="count-text">0</span></div>
        <div id="singer-label">🎤 <span id="singer-name">Anónimo</span></div>
        <div id="vote-display">
            <div class="vote-box"><span style="font-size:24px;">⭐</span> <span id="star-count">0</span></div>
            <div class="vote-box"><span style="font-size:24px;">🍅</span> <span id="tomato-count">0</span></div>
        </div>
        <div id="countdown-overlay" class="overlay">
            <div class="next-text">A continuación</div>
            <div class="next-name" id="next-singer-name">Nadie</div>
            <div class="result" id="vote-result"></div>
            <div class="timer" id="countdown-timer">5</div>
        </div>
        <div id="blocked-overlay" class="overlay">
            <div class="blocked-icon">⛔</div>
            <div class="blocked-text">Video Bloqueado</div>
            <div class="blocked-sub">Esta versión no se puede reproducir.<br>Prueba buscando otra versión.</div>
        </div>
        <div id="player"></div>
    </div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "PEGAR_AQUI", authDomain: "PEGAR_AQUI", databaseURL: "PEGAR_AQUI", projectId: "PEGAR_AQUI", storageBucket: "PEGAR_AQUI", messagingSenderId: "PEGAR_AQUI", appId: "PEGAR_AQUI" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let player, playlist = [], isPlaying = false, countdownInterval, forceNextPlay = false, queueRef, votesRef, currentVotes = { stars: 0, tomatoes: 0 };

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', { height: '100%', width: '100%', videoId: '', playerVars: { 'playsinline': 1, 'autoplay': 1, 'controls': 1 }, events: { 'onStateChange': onPlayerStateChange, 'onError': onPlayerError } });
        }
        function startParty() {
            let code = document.getElementById('room-input').value.trim().toUpperCase();
            if(code.length < 3) { alert("Código corto"); return; }
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('code-text').innerText = code;
            queueRef = db.ref('rooms/' + code + '/queue');
            votesRef = db.ref('rooms/' + code + '/votes');
            listenQueue(); listenVotes();
        }
        function listenVotes() {
            votesRef.on('value', (snapshot) => {
                currentVotes = snapshot.val() || { stars: 0, tomatoes: 0 };
                document.getElementById('star-count').innerText = currentVotes.stars;
                document.getElementById('tomato-count').innerText = currentVotes.tomatoes;
                document.getElementById('vote-display').style.display = isPlaying ? 'flex' : 'none';
            });
        }
        function resetVotes() { votesRef.set({ stars: 0, tomatoes: 0 }); }
        function listenQueue() {
            queueRef.on('child_added', (s) => { playlist.push({ id: s.key, videoId: s.val().videoId, name: s.val().name }); document.getElementById('count-text').innerText = playlist.length; if (!isPlaying) playNext(); });
            queueRef.on('child_removed', (s) => { playlist = playlist.filter(i => i.id !== s.key); document.getElementById('count-text').innerText = playlist.length; if (forceNextPlay) { forceNextPlay = false; playNext(); } else { if (playlist.length > 0 || isPlaying) playNext(); } });
        }
        function onPlayerStateChange(e) { if (e.data == YT.PlayerState.ENDED) { if (playlist.length > 1) showCountdown(playlist[1].name); else queueRef.child(playlist[0].id).remove(); } }
        function onPlayerError() { let o = document.getElementById("blocked-overlay"); o.style.display = 'flex'; setTimeout(() => { o.style.display = 'none'; forceNextPlay = true; queueRef.child(playlist[0].id).remove(); }, 4000); }
        function showCountdown(nextName) {
            let o = document.getElementById('countdown-overlay'), n = document.getElementById('next-singer-name'), t = document.getElementById('countdown-timer'), r = document.getElementById('vote-result');
            let rt = ""; if (currentVotes.stars > 0 || currentVotes.tomatoes > 0) { if(currentVotes.stars > currentVotes.tomatoes) rt = `¡APLAUSOS! (${currentVotes.stars}⭐ / ${currentVotes.tomatoes}🍅)`; else rt = `TOMATEADO (${currentVotes.stars}⭐ / ${currentVotes.tomatoes}🍅)`; }
            r.innerText = rt; n.innerText = nextName || "Anónimo"; o.style.display = 'flex';
            let tl = 5; t.innerText = tl;
            countdownInterval = setInterval(() => { tl--; t.innerText = tl; if (tl <= 0) { clearInterval(countdownInterval); o.style.display = 'none'; forceNextPlay = true; queueRef.child(playlist[0].id).remove(); playlist.shift(); resetVotes(); playNext(); } }, 1000);
        }
        function playNext() {
            if (playlist.length > 0) { isPlaying = true; player.loadVideoById(playlist[0].videoId); document.getElementById('count-text').innerText = playlist.length; document.getElementById("singer-name").innerText = playlist[0].name || "Anónimo"; document.getElementById("singer-label").style.display = "block"; resetVotes(); }
            else { isPlaying = false; player.stopVideo(); document.getElementById('count-text').innerText = "0"; document.getElementById("singer-label").style.display = "none"; }
        }
        document.getElementById('room-input').addEventListener('input', function(e) {
            let code = e.target.value.trim().toUpperCase();
            if(code.length >= 3) {
                let p = window.location.pathname.split('/'); p.pop();
                let base = window.location.origin + p.join('/') + '/mando.html';
                document.getElementById('qr-dj').src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + base + "?room=" + code + "&role=dj";
                document.getElementById('qr-guest').src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + base + "?room=" + code + "&role=guest";
                document.getElementById('qr-container').style.display = 'flex';
            } else { document.getElementById('qr-container').style.display = 'none'; }
        });
    </script>
</body>
</html>
